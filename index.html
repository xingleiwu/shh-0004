<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>翻牌记忆配对游戏</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --primary: #6366f1;
    --primary-light: #818cf8;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
    --bg: #0f172a;
    --card-bg: #1e293b;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
    min-height: 100vh;
    color: var(--text);
    padding: 16px;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle at 20% 80%, rgba(99,102,241,0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(139,92,246,0.1) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  .container {
    max-width: 1200px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }
  .header {
    text-align: center;
    padding: 20px 0 30px;
  }
  .header h1 {
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 800;
    background: linear-gradient(135deg, var(--primary-light), #a78bfa, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .header p {
    color: var(--text-muted);
    font-size: clamp(0.85rem, 2.5vw, 1rem);
  }
  .panel {
    background: rgba(30, 41, 59, 0.6);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
  }
  .settings {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    align-items: end;
  }
  .setting-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .setting-group label {
    font-size: 0.85rem;
    color: var(--text-muted);
    font-weight: 600;
  }
  select, button {
    font-family: inherit;
    font-size: 0.95rem;
    padding: 12px 18px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(15, 23, 42, 0.8);
    color: var(--text);
    cursor: pointer;
    transition: all 0.25s ease;
    font-weight: 600;
  }
  select:hover, select:focus {
    border-color: var(--primary);
    outline: none;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--primary), #8b5cf6);
    border: none;
    box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 25px rgba(99, 102, 241, 0.5);
  }
  .btn-secondary {
    background: rgba(255,255,255,0.05);
  }
  .btn-secondary:hover {
    background: rgba(255,255,255,0.1);
  }
  .btn-danger {
    background: linear-gradient(135deg, var(--danger), #dc2626);
    border: none;
  }
  .btn-success {
    background: linear-gradient(135deg, var(--success), #059669);
    border: none;
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 12px;
    margin-bottom: 0;
  }
  .stat-card {
    text-align: center;
    padding: 16px;
    border-radius: 16px;
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .stat-card.active {
    border-color: var(--primary);
    background: rgba(99, 102, 241, 0.15);
    box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
  }
  .stat-card .label {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .stat-card .value {
    font-size: clamp(1.2rem, 4vw, 1.6rem);
    font-weight: 800;
    font-variant-numeric: tabular-nums;
  }
  .stat-card.player1 .value { color: #60a5fa; }
  .stat-card.player2 .value { color: #f472b6; }
  .game-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 16px;
  }
  .game-actions button {
    flex: 1;
    min-width: 100px;
  }
  .board-wrapper {
    display: flex;
    justify-content: center;
    padding: 10px 0;
  }
  .board {
    display: grid;
    gap: clamp(6px, 1.5vw, 14px);
    width: 100%;
    max-width: 700px;
    aspect-ratio: 1;
  }
  .board.size-4 { grid-template-columns: repeat(4, 1fr); }
  .board.size-6 { grid-template-columns: repeat(6, 1fr); }
  .board.size-8 { grid-template-columns: repeat(8, 1fr); max-width: 650px; }
  .card {
    position: relative;
    perspective: 1000px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .card-inner {
    position: absolute;
    inset: 0;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: clamp(8px, 1.5vw, 14px);
  }
  .card.flipped .card-inner {
    transform: rotateY(180deg);
  }
  .card.matched .card-inner {
    animation: matchPulse 0.5s ease;
  }
  .card.matched {
    pointer-events: none;
  }
  @keyframes matchPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: inherit;
    font-size: clamp(1.2rem, 3.5vw, 2.8rem);
    font-weight: bold;
    overflow: hidden;
  }
  .card-back {
    background: linear-gradient(135deg, var(--primary), #8b5cf6, #ec4899);
    background-size: 200% 200%;
    animation: gradientShift 4s ease infinite;
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4),
                inset 0 0 0 2px rgba(255,255,255,0.1);
  }
  .card-back::before {
    content: '?';
    font-size: clamp(1rem, 3vw, 2rem);
    color: rgba(255,255,255,0.9);
    font-weight: 900;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
  }
  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  .card-front {
    background: linear-gradient(135deg, #1e293b, #334155);
    transform: rotateY(180deg);
    box-shadow: 0 4px 15px rgba(0,0,0,0.3),
                inset 0 0 0 2px rgba(255,255,255,0.06);
  }
  .card.matched .card-front {
    background: linear-gradient(135deg, #064e3b, #065f46);
    box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
  }
  .tab-buttons {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .tab-btn {
    flex: 1;
    padding: 10px;
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(255,255,255,0.06);
    color: var(--text-muted);
    font-size: 0.9rem;
  }
  .tab-btn.active {
    background: linear-gradient(135deg, var(--primary), #8b5cf6);
    color: white;
    border-color: transparent;
  }
  .leaderboard {
    max-height: 400px;
    overflow-y: auto;
  }
  .leaderboard::-webkit-scrollbar { width: 6px; }
  .leaderboard::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 3px; }
  .leaderboard::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }
  .leaderboard-item {
    display: grid;
    grid-template-columns: 40px 1fr auto auto;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 12px;
    margin-bottom: 8px;
    background: rgba(15, 23, 42, 0.5);
    border: 1px solid rgba(255,255,255,0.04);
    font-size: 0.9rem;
  }
  .leaderboard-item.top1 { border-color: #fbbf24; background: rgba(251, 191, 36, 0.08); }
  .leaderboard-item.top2 { border-color: #9ca3af; background: rgba(156, 163, 175, 0.06); }
  .leaderboard-item.top3 { border-color: #d97706; background: rgba(217, 119, 6, 0.06); }
  .rank {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    font-weight: 800;
    background: rgba(255,255,255,0.05);
    font-size: 0.85rem;
  }
  .top1 .rank { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #000; }
  .top2 .rank { background: linear-gradient(135deg, #d1d5db, #9ca3af); color: #000; }
  .top3 .rank { background: linear-gradient(135deg, #f59e0b, #d97706); color: #000; }
  .lb-info { display: flex; flex-direction: column; gap: 2px; }
  .lb-mode {
    font-size: 0.75rem;
    color: var(--text-muted);
  }
  .lb-date {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-align: right;
  }
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
    padding: 16px;
  }
  .modal-overlay.show {
    opacity: 1;
    visibility: visible;
  }
  .modal {
    background: linear-gradient(135deg, #1e293b, #1e1b4b);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 32px 28px;
    max-width: 450px;
    width: 100%;
    transform: scale(0.9) translateY(20px);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 25px 80px rgba(0,0,0,0.6);
  }
  .modal-overlay.show .modal {
    transform: scale(1) translateY(0);
  }
  .modal-title {
    font-size: 1.8rem;
    font-weight: 800;
    text-align: center;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--primary-light), #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .modal-subtitle {
    text-align: center;
    color: var(--text-muted);
    margin-bottom: 24px;
    font-size: 0.95rem;
  }
  .victory-emoji {
    text-align: center;
    font-size: 4rem;
    margin-bottom: 16px;
    animation: bounce 1s ease infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }
  .result-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }
  .result-stat {
    background: rgba(15, 23, 42, 0.6);
    padding: 16px;
    border-radius: 14px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .result-stat .lbl {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .result-stat .val {
    font-size: 1.5rem;
    font-weight: 800;
  }
  .modal-actions {
    display: flex;
    gap: 10px;
    flex-direction: column;
  }
  .pause-hint {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    z-index: 10;
    font-size: 2rem;
    font-weight: 800;
    color: var(--primary-light);
    letter-spacing: 4px;
  }
  .board-container {
    position: relative;
  }
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: rgba(15, 23, 42, 0.95);
    color: white;
    padding: 14px 24px;
    border-radius: 14px;
    font-weight: 600;
    z-index: 200;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--success); }
  .toast.error { border-color: var(--danger); }
  @media (max-width: 480px) {
    body { padding: 12px; }
    .panel { padding: 16px; }
    .modal { padding: 24px 20px; }
    .settings { grid-template-columns: 1fr; }
    .game-actions button { min-width: 80px; padding: 10px 12px; font-size: 0.85rem; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🃏 记忆翻牌</h1>
    <p>挑战你的记忆力，找到所有配对的卡牌</p>
  </div>

  <div class="panel">
    <div class="settings">
      <div class="setting-group">
        <label>游戏难度</label>
        <select id="difficulty">
          <option value="4">简单 (4×4)</option>
          <option value="6" selected>中等 (6×6)</option>
          <option value="8">困难 (8×8)</option>
        </select>
      </div>
      <div class="setting-group">
        <label>游戏模式</label>
        <select id="gameMode">
          <option value="single">单人模式</option>
          <option value="double">双人对战</option>
        </select>
      </div>
      <div class="setting-group">
        <button class="btn-primary" id="startBtn">🎮 开始游戏</button>
      </div>
    </div>
  </div>

  <div class="panel" id="statsPanel" style="display:none;">
    <div class="stats" id="statsContainer"></div>
    <div class="game-actions">
      <button class="btn-secondary" id="pauseBtn">⏸️ 暂停</button>
      <button class="btn-secondary" id="restartBtn">🔄 重新开始</button>
      <button class="btn-danger" id="quitBtn">❌ 退出</button>
    </div>
  </div>

  <div class="panel board-container" id="boardPanel" style="display:none;">
    <div class="board-wrapper">
      <div class="board" id="board"></div>
    </div>
    <div class="pause-hint" id="pauseHint" style="display:none;">已暂停</div>
  </div>

  <div class="panel">
    <div class="tab-buttons">
      <button class="tab-btn active" data-tab="single">🏆 单人榜</button>
      <button class="tab-btn" data-tab="double">👥 双人榜</button>
    </div>
    <div id="leaderboardContent"></div>
  </div>
</div>

<div class="modal-overlay" id="victoryModal">
  <div class="modal">
    <div class="victory-emoji" id="victoryEmoji">🎉</div>
    <div class="modal-title" id="victoryTitle">游戏结束！</div>
    <div class="modal-subtitle" id="victorySubtitle"></div>
    <div class="result-stats" id="victoryStats"></div>
    <div class="modal-actions">
      <button class="btn-primary" id="playAgainBtn">🔁 再来一局</button>
      <button class="btn-secondary" id="closeModalBtn">关闭</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  const EMOJIS = [
    '🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🐔',
    '🐧','🐦','🐤','🦆','🦅','🦉','🦇','🐺','🐗','🐴','🦄','🐝','🐛','🦋','🐌','🐞',
    '🐢','🐍','🦎','🦖','🦕','🐙','🦑','🦐','🦞','🐡','🐠','🐟','🐬','🐳','🐊','🐅',
    '🐆','🦓','🦍','🦧','🐘','🦛','🦏','🐪','🐫','🦒','🦘','🐃','🐂','🐄','🐎','🐖'
  ];

  let state = {
    size: 6,
    mode: 'single',
    cards: [],
    flipped: [],
    matched: [],
    moves: 0,
    startTime: null,
    elapsed: 0,
    timer: null,
    isPaused: false,
    isProcessing: false,
    currentPlayer: 1,
    scores: { 1: 0, 2: 0 },
    gameStarted: false
  };

  const $ = id => document.getElementById(id);

  const board = $('board');
  const difficultySelect = $('difficulty');
  const modeSelect = $('gameMode');
  const startBtn = $('startBtn');
  const pauseBtn = $('pauseBtn');
  const restartBtn = $('restartBtn');
  const quitBtn = $('quitBtn');
  const statsPanel = $('statsPanel');
  const boardPanel = $('boardPanel');
  const statsContainer = $('statsContainer');
  const pauseHint = $('pauseHint');
  const victoryModal = $('victoryModal');
  const playAgainBtn = $('playAgainBtn');
  const closeModalBtn = $('closeModalBtn');
  const toast = $('toast');
  const leaderboardContent = $('leaderboardContent');

  startBtn.addEventListener('click', startGame);
  pauseBtn.addEventListener('click', togglePause);
  restartBtn.addEventListener('click', restartGame);
  quitBtn.addEventListener('click', quitGame);
  playAgainBtn.addEventListener('click', () => {
    closeVictoryModal();
    restartGame();
  });
  closeModalBtn.addEventListener('click', closeVictoryModal);
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderLeaderboard(btn.dataset.tab);
    });
  });

  function showToast(msg, type = '') {
    toast.textContent = msg;
    toast.className = 'toast show ' + type;
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function formatTime(ms) {
    const s = Math.floor(ms / 1000);
    const m = Math.floor(s / 60);
    const ss = s % 60;
    return `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
  }

  function startGame() {
    state.size = parseInt(difficultySelect.value);
    state.mode = modeSelect.value;
    state.cards = [];
    state.flipped = [];
    state.matched = [];
    state.moves = 0;
    state.elapsed = 0;
    state.isPaused = false;
    state.isProcessing = false;
    state.currentPlayer = 1;
    state.scores = { 1: 0, 2: 0 };
    state.gameStarted = true;

    const totalPairs = (state.size * state.size) / 2;
    const selectedEmojis = shuffle([...EMOJIS]).slice(0, totalPairs);
    const cardValues = shuffle([...selectedEmojis, ...selectedEmojis]);

    state.cards = cardValues.map((val, idx) => ({
      id: idx,
      value: val,
      flipped: false,
      matched: false
    }));

    statsPanel.style.display = 'block';
    boardPanel.style.display = 'block';
    pauseHint.style.display = 'none';

    renderStats();
    renderBoard();
    startTimer();
    showToast('游戏开始！', 'success');
  }

  function renderBoard() {
    board.className = 'board size-' + state.size;
    board.innerHTML = '';
    state.cards.forEach(card => {
      const el = document.createElement('div');
      el.className = 'card';
      el.dataset.id = card.id;
      el.innerHTML = `
        <div class="card-inner">
          <div class="card-face card-back"></div>
          <div class="card-face card-front">${card.value}</div>
        </div>
      `;
      el.addEventListener('click', () => handleCardClick(card.id));
      board.appendChild(el);
    });
  }

  function renderStats() {
    let html = '';
    if (state.mode === 'single') {
      html = `
        <div class="stat-card">
          <div class="label">⏱️ 用时</div>
          <div class="value" id="timeDisplay">${formatTime(state.elapsed)}</div>
        </div>
        <div class="stat-card">
          <div class="label">👆 步数</div>
          <div class="value" id="movesDisplay">${state.moves}</div>
        </div>
        <div class="stat-card">
          <div class="label">✅ 进度</div>
          <div class="value" id="progressDisplay">${state.matched.length}/${state.cards.length}</div>
        </div>
      `;
    } else {
      html = `
        <div class="stat-card player1 ${state.currentPlayer === 1 ? 'active' : ''}">
          <div class="label">👤 玩家1</div>
          <div class="value" id="p1Score">${state.scores[1]}</div>
        </div>
        <div class="stat-card player2 ${state.currentPlayer === 2 ? 'active' : ''}">
          <div class="label">👤 玩家2</div>
          <div class="value" id="p2Score">${state.scores[2]}</div>
        </div>
        <div class="stat-card">
          <div class="label">⏱️ 用时</div>
          <div class="value" id="timeDisplay">${formatTime(state.elapsed)}</div>
        </div>
        <div class="stat-card">
          <div class="label">✅ 进度</div>
          <div class="value" id="progressDisplay">${state.matched.length}/${state.cards.length}</div>
        </div>
      `;
    }
    statsContainer.innerHTML = html;
  }

  function updateStatDisplays() {
    const timeEl = $('timeDisplay');
    if (timeEl) timeEl.textContent = formatTime(state.elapsed);
    const movesEl = $('movesDisplay');
    if (movesEl) movesEl.textContent = state.moves;
    const progEl = $('progressDisplay');
    if (progEl) progEl.textContent = `${state.matched.length}/${state.cards.length}`;
    if (state.mode === 'double') {
      const p1 = $('p1Score');
      const p2 = $('p2Score');
      if (p1) p1.textContent = state.scores[1];
      if (p2) p2.textContent = state.scores[2];
      document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active'));
      const active = state.currentPlayer === 1 ? 0 : 1;
      document.querySelectorAll('.stat-card')[active]?.classList.add('active');
    }
  }

  function startTimer() {
    stopTimer();
    state.startTime = Date.now() - state.elapsed;
    state.timer = setInterval(() => {
      if (!state.isPaused) {
        state.elapsed = Date.now() - state.startTime;
        updateStatDisplays();
      }
    }, 250);
  }

  function stopTimer() {
    if (state.timer) {
      clearInterval(state.timer);
      state.timer = null;
    }
  }

  function togglePause() {
    if (!state.gameStarted) return;
    state.isPaused = !state.isPaused;
    pauseHint.style.display = state.isPaused ? 'flex' : 'none';
    pauseBtn.textContent = state.isPaused ? '▶️ 继续' : '⏸️ 暂停';
    if (state.isPaused) {
      showToast('游戏已暂停', '');
    } else {
      state.startTime = Date.now() - state.elapsed;
      showToast('游戏继续', 'success');
    }
  }

  function handleCardClick(id) {
    if (!state.gameStarted || state.isPaused || state.isProcessing) return;
    const card = state.cards[id];
    if (card.flipped || card.matched) return;

    card.flipped = true;
    state.flipped.push(card);
    const el = board.querySelector(`[data-id="${id}"]`);
    el.classList.add('flipped');

    if (state.flipped.length === 2) {
      state.moves++;
      state.isProcessing = true;
      updateStatDisplays();
      checkMatch();
    }
  }

  function checkMatch() {
    const [c1, c2] = state.flipped;
    if (c1.value === c2.value) {
      c1.matched = true;
      c2.matched = true;
      state.matched.push(c1, c2);
      const el1 = board.querySelector(`[data-id="${c1.id}"]`);
      const el2 = board.querySelector(`[data-id="${c2.id}"]`);
      el1.classList.add('matched');
      el2.classList.add('matched');

      if (state.mode === 'double') {
        state.scores[state.currentPlayer]++;
      }
      state.flipped = [];
      state.isProcessing = false;
      updateStatDisplays();
      showToast('配对成功！ ✨', 'success');
      setTimeout(checkWin, 300);
    } else {
      setTimeout(() => {
        c1.flipped = false;
        c2.flipped = false;
        const el1 = board.querySelector(`[data-id="${c1.id}"]`);
        const el2 = board.querySelector(`[data-id="${c2.id}"]`);
        el1.classList.remove('flipped');
        el2.classList.remove('flipped');
        state.flipped = [];
        state.isProcessing = false;
        if (state.mode === 'double') {
          state.currentPlayer = state.currentPlayer === 1 ? 2 : 1;
          updateStatDisplays();
        }
      }, 1000);
    }
  }

  function checkWin() {
    if (state.matched.length === state.cards.length) {
      stopTimer();
      state.gameStarted = false;
      saveRecord();
      setTimeout(showVictory, 500);
    }
  }

  function saveRecord() {
    const key = state.mode === 'single' ? 'memory_single_records' : 'memory_double_records';
    const records = JSON.parse(localStorage.getItem(key) || '[]');
    const record = {
      size: state.size,
      time: state.elapsed,
      moves: state.moves,
      date: new Date().toISOString(),
      scores: state.mode === 'double' ? { ...state.scores } : null
    };
    records.push(record);
    records.sort((a, b) => {
      if (a.size !== b.size) return a.size - b.size;
      if (state.mode === 'single') {
        if (a.time !== b.time) return a.time - b.time;
        return a.moves - b.moves;
      }
      return 0;
    });
    localStorage.setItem(key, JSON.stringify(records.slice(0, 50)));
    renderLeaderboard(state.mode);
  }

  function showVictory() {
    const modal = victoryModal;
    const title = $('victoryTitle');
    const subtitle = $('victorySubtitle');
    const emoji = $('victoryEmoji');
    const stats = $('victoryStats');

    if (state.mode === 'single') {
      emoji.textContent = '🎉';
      title.textContent = '恭喜通关！';
      subtitle.textContent = `难度：${state.size}×${state.size}`;
      stats.innerHTML = `
        <div class="result-stat">
          <div class="lbl">⏱️ 用时</div>
          <div class="val">${formatTime(state.elapsed)}</div>
        </div>
        <div class="result-stat">
          <div class="lbl">👆 步数</div>
          <div class="val">${state.moves}</div>
        </div>
      `;
    } else {
      const p1 = state.scores[1];
      const p2 = state.scores[2];
      if (p1 > p2) {
        emoji.textContent = '🏆';
        title.textContent = '玩家1 获胜！';
      } else if (p2 > p1) {
        emoji.textContent = '🎖️';
        title.textContent = '玩家2 获胜！';
      } else {
        emoji.textContent = '🤝';
        title.textContent = '平局！';
      }
      subtitle.textContent = `难度：${state.size}×${state.size} · 用时 ${formatTime(state.elapsed)}`;
      stats.innerHTML = `
        <div class="result-stat" style="border-color: rgba(96,165,250,0.3);">
          <div class="lbl">👤 玩家1</div>
          <div class="val" style="color:#60a5fa;">${p1} 对</div>
        </div>
        <div class="result-stat" style="border-color: rgba(244,114,182,0.3);">
          <div class="lbl">👤 玩家2</div>
          <div class="val" style="color:#f472b6;">${p2} 对</div>
        </div>
      `;
    }

    modal.classList.add('show');
  }

  function closeVictoryModal() {
    victoryModal.classList.remove('show');
  }

  function restartGame() {
    if (state.timer) stopTimer();
    startGame();
  }

  function quitGame() {
    if (state.timer) stopTimer();
    state.gameStarted = false;
    statsPanel.style.display = 'none';
    boardPanel.style.display = 'none';
    showToast('已退出游戏', '');
  }

  function renderLeaderboard(tab) {
    const key = tab === 'single' ? 'memory_single_records' : 'memory_double_records';
    const records = JSON.parse(localStorage.getItem(key) || '[]');

    if (records.length === 0) {
      leaderboardContent.innerHTML = `
        <div class="empty-state">
          <div class="icon">📭</div>
          <div>暂无记录，开始游戏创建你的第一个记录吧！</div>
        </div>
      `;
      return;
    }

    const sizeMap = { 4: '简单 4×4', 6: '中等 6×6', 8: '困难 8×8' };
    const html = ['<div class="leaderboard">'];

    records.forEach((r, i) => {
      const cls = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
      const date = new Date(r.date);
      const dateStr = `${date.getMonth()+1}/${date.getDate()} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;

      if (tab === 'single') {
        html.push(`
          <div class="leaderboard-item ${cls}">
            <div class="rank">${i + 1}</div>
            <div class="lb-info">
              <div>${sizeMap[r.size] || r.size + '×' + r.size}</div>
              <div class="lb-mode">${r.moves} 步</div>
            </div>
            <div style="font-weight:700;font-size:1rem;">${formatTime(r.time)}</div>
            <div class="lb-date">${dateStr}</div>
          </div>
        `);
      } else {
        html.push(`
          <div class="leaderboard-item ${cls}">
            <div class="rank">${i + 1}</div>
            <div class="lb-info">
              <div>${sizeMap[r.size] || r.size + '×' + r.size}</div>
              <div class="lb-mode">P1:${r.scores?.[1] || 0} vs P2:${r.scores?.[2] || 0}</div>
            </div>
            <div style="font-weight:700;font-size:1rem;">${formatTime(r.time)}</div>
            <div class="lb-date">${dateStr}</div>
          </div>
        `);
      }
    });

    html.push('</div>');
    leaderboardContent.innerHTML = html.join('');
  }

  renderLeaderboard('single');
})();
</script>
</body>
</html>

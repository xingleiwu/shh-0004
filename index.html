<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>翻牌记忆配对游戏</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --primary: #6366f1;
    --primary-light: #818cf8;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
    --p1-color: #3b82f6;
    --p1-color-light: #60a5fa;
    --p2-color: #ec4899;
    --p2-color-light: #f472b6;
    --bg: #0f172a;
    --card-bg: #1e293b;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
    min-height: 100vh;
    color: var(--text);
    padding: 16px;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle at 20% 80%, rgba(99,102,241,0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(139,92,246,0.1) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  .container {
    max-width: 1400px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }
  .header {
    text-align: center;
    padding: 20px 0 30px;
  }
  .header h1 {
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 800;
    background: linear-gradient(135deg, var(--primary-light), #a78bfa, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .header p {
    color: var(--text-muted);
    font-size: clamp(0.85rem, 2.5vw, 1rem);
  }
  .panel {
    background: rgba(30, 41, 59, 0.6);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
  }
  .settings {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    align-items: end;
  }
  .setting-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .setting-group label {
    font-size: 0.85rem;
    color: var(--text-muted);
    font-weight: 600;
  }
  select, button {
    font-family: inherit;
    font-size: 0.95rem;
    padding: 12px 18px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(15, 23, 42, 0.8);
    color: var(--text);
    cursor: pointer;
    transition: all 0.25s ease;
    font-weight: 600;
  }
  select:hover, select:focus {
    border-color: var(--primary);
    outline: none;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--primary), #8b5cf6);
    border: none;
    box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 25px rgba(99, 102, 241, 0.5);
  }
  .btn-secondary {
    background: rgba(255,255,255,0.05);
  }
  .btn-secondary:hover {
    background: rgba(255,255,255,0.1);
  }
  .btn-danger {
    background: linear-gradient(135deg, var(--danger), #dc2626);
    border: none;
  }
  .btn-success {
    background: linear-gradient(135deg, var(--success), #059669);
    border: none;
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 12px;
    margin-bottom: 0;
  }
  .stat-card {
    text-align: center;
    padding: 16px;
    border-radius: 16px;
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .stat-card.active {
    border-color: var(--primary);
    background: rgba(99, 102, 241, 0.15);
    box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
  }
  .stat-card .label {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .stat-card .value {
    font-size: clamp(1.2rem, 4vw, 1.6rem);
    font-weight: 800;
    font-variant-numeric: tabular-nums;
  }
  .stat-card.player1 .value { color: var(--p1-color-light); }
  .stat-card.player2 .value { color: var(--p2-color-light); }

  .scoreboard {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 12px;
    align-items: stretch;
    margin-bottom: 16px;
  }
  .score-col {
    border-radius: 16px;
    padding: 16px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
  }
  .score-col.p1 {
    background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(15, 23, 42, 0.4));
    border: 2px solid rgba(59, 130, 246, 0.3);
  }
  .score-col.p2 {
    background: linear-gradient(135deg, rgba(236, 72, 153, 0.15), rgba(15, 23, 42, 0.4));
    border: 2px solid rgba(236, 72, 153, 0.3);
  }
  .score-col.leading {
    transform: scale(1.02);
    box-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
  }
  .score-col.p1.leading {
    border-color: var(--p1-color);
    box-shadow: 0 0 30px rgba(59, 130, 246, 0.4);
  }
  .score-col.p2.leading {
    border-color: var(--p2-color);
    box-shadow: 0 0 30px rgba(236, 72, 153, 0.4);
  }
  .score-col.tied {
    border-color: var(--warning);
  }
  .score-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .score-header h4 {
    font-size: 1rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .score-col.p1 .score-header h4 { color: var(--p1-color-light); }
  .score-col.p2 .score-header h4 { color: var(--p2-color-light); }
  .leading-badge {
    font-size: 0.7rem;
    padding: 3px 8px;
    border-radius: 10px;
    background: var(--warning);
    color: #000;
    font-weight: 800;
    display: none;
  }
  .score-col.leading .leading-badge {
    display: inline-block;
    animation: pulseBadge 1.5s ease infinite;
  }
  .progress-bar-container {
    background: rgba(15, 23, 42, 0.6);
    border-radius: 10px;
    height: 16px;
    overflow: hidden;
    margin-bottom: 12px;
    position: relative;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .progress-bar {
    height: 100%;
    border-radius: 10px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }
  .score-col.p1 .progress-bar {
    background: linear-gradient(90deg, var(--p1-color), var(--p1-color-light));
    box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
  }
  .score-col.p2 .progress-bar {
    background: linear-gradient(90deg, var(--p2-color), var(--p2-color-light));
    box-shadow: 0 0 10px rgba(236, 72, 153, 0.5);
  }
  .progress-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 0.75rem;
    font-weight: 800;
    color: white;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    z-index: 1;
    white-space: nowrap;
  }
  .score-details {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .score-detail {
    background: rgba(15, 23, 42, 0.4);
    border-radius: 10px;
    padding: 8px 10px;
    text-align: center;
  }
  .score-detail .sd-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }
  .score-detail .sd-value {
    font-size: 1.05rem;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
  }
  .score-col.p1 .sd-value { color: var(--p1-color-light); }
  .score-col.p2 .sd-value { color: var(--p2-color-light); }
  .score-vs {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
  }
  .score-vs-badge {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--p1-color), var(--p2-color));
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 0.85rem;
    box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
  }
  .score-vs-status {
    font-size: 0.75rem;
    color: var(--text-muted);
    font-weight: 600;
    text-align: center;
    max-width: 60px;
  }
  @media (max-width: 600px) {
    .scoreboard {
      gap: 8px;
    }
    .score-col {
      padding: 12px;
    }
    .score-details {
      grid-template-columns: 1fr;
    }
    .score-vs-badge {
      width: 36px;
      height: 36px;
      font-size: 0.75rem;
    }
  }

  .game-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 16px;
  }
  .game-actions button {
    flex: 1;
    min-width: 100px;
  }
  .boards-container {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
  }
  .boards-container.double {
    grid-template-columns: 1fr 1fr;
  }
  @media (max-width: 900px) {
    .boards-container.double {
      grid-template-columns: 1fr;
    }
  }
  .player-board {
    border-radius: 20px;
    padding: 16px;
    background: rgba(15, 23, 42, 0.4);
    border: 2px solid transparent;
  }
  .player-board.p1 {
    border-color: rgba(59, 130, 246, 0.4);
    background: linear-gradient(135deg, rgba(59, 130, 246, 0.05), rgba(15, 23, 42, 0.4));
  }
  .player-board.p2 {
    border-color: rgba(236, 72, 153, 0.4);
    background: linear-gradient(135deg, rgba(236, 72, 153, 0.05), rgba(15, 23, 42, 0.4));
  }
  .player-board.finished {
    opacity: 0.6;
  }
  .player-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 8px 12px;
    margin-bottom: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .player-title h3 {
    font-size: 1.1rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .player-board.p1 .player-title h3 { color: var(--p1-color-light); }
  .player-board.p2 .player-title h3 { color: var(--p2-color-light); }
  .player-mini-stats {
    display: flex;
    gap: 16px;
    font-size: 0.85rem;
    color: var(--text-muted);
  }
  .player-mini-stats span {
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .player-board.p1 .player-mini-stats span { color: var(--p1-color-light); }
  .player-board.p2 .player-mini-stats span { color: var(--p2-color-light); }
  .board-wrapper {
    display: flex;
    justify-content: center;
    padding: 10px 0;
  }
  .board {
    display: grid;
    gap: clamp(4px, 1vw, 10px);
    width: 100%;
    max-width: 600px;
    aspect-ratio: 1;
  }
  .board.size-4 { grid-template-columns: repeat(4, 1fr); }
  .board.size-6 { grid-template-columns: repeat(6, 1fr); }
  .board.size-8 { grid-template-columns: repeat(8, 1fr); max-width: 550px; }
  .card {
    position: relative;
    perspective: 1000px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .card-inner {
    position: absolute;
    inset: 0;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: clamp(6px, 1.2vw, 12px);
  }
  .card.flipped .card-inner {
    transform: rotateY(180deg);
  }
  .card.matched .card-inner {
    animation: matchPulse 0.5s ease;
  }
  .card.matched {
    pointer-events: none;
  }
  @keyframes matchPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: inherit;
    font-size: clamp(1rem, 3vw, 2.2rem);
    font-weight: bold;
    overflow: hidden;
  }
  .card-back {
    background: linear-gradient(135deg, var(--primary), #8b5cf6, #ec4899);
    background-size: 200% 200%;
    animation: gradientShift 4s ease infinite;
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4),
                inset 0 0 0 2px rgba(255,255,255,0.1);
  }
  .player-board.p1 .card-back {
    background: linear-gradient(135deg, #1d4ed8, #3b82f6, #60a5fa);
    background-size: 200% 200%;
    animation: gradientShift 4s ease infinite;
    box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4),
                inset 0 0 0 2px rgba(255,255,255,0.1);
  }
  .player-board.p2 .card-back {
    background: linear-gradient(135deg, #be185d, #ec4899, #f472b6);
    background-size: 200% 200%;
    animation: gradientShift 4s ease infinite;
    box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4),
                inset 0 0 0 2px rgba(255,255,255,0.1);
  }
  .card-back::before {
    content: '?';
    font-size: clamp(0.8rem, 2.5vw, 1.6rem);
    color: rgba(255,255,255,0.9);
    font-weight: 900;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
  }
  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  .card-front {
    background: linear-gradient(135deg, #1e293b, #334155);
    transform: rotateY(180deg);
    box-shadow: 0 4px 15px rgba(0,0,0,0.3),
                inset 0 0 0 2px rgba(255,255,255,0.06);
  }
  .card.matched .card-front {
    background: linear-gradient(135deg, #064e3b, #065f46);
    box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
  }
  .finished-badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
    background: var(--success);
    color: #000;
    animation: pulseBadge 1.5s ease infinite;
  }
  @keyframes pulseBadge {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
  .tab-buttons {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .tab-btn {
    flex: 1;
    padding: 10px;
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(255,255,255,0.06);
    color: var(--text-muted);
    font-size: 0.9rem;
  }
  .tab-btn.active {
    background: linear-gradient(135deg, var(--primary), #8b5cf6);
    color: white;
    border-color: transparent;
  }
  .leaderboard {
    max-height: 400px;
    overflow-y: auto;
  }
  .leaderboard::-webkit-scrollbar { width: 6px; }
  .leaderboard::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 3px; }
  .leaderboard::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }
  .leaderboard-item {
    display: grid;
    grid-template-columns: 40px 1fr auto auto;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 12px;
    margin-bottom: 8px;
    background: rgba(15, 23, 42, 0.5);
    border: 1px solid rgba(255,255,255,0.04);
    font-size: 0.9rem;
  }
  .leaderboard-item.top1 { border-color: #fbbf24; background: rgba(251, 191, 36, 0.08); }
  .leaderboard-item.top2 { border-color: #9ca3af; background: rgba(156, 163, 175, 0.06); }
  .leaderboard-item.top3 { border-color: #d97706; background: rgba(217, 119, 6, 0.06); }
  .rank {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    font-weight: 800;
    background: rgba(255,255,255,0.05);
    font-size: 0.85rem;
  }
  .top1 .rank { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #000; }
  .top2 .rank { background: linear-gradient(135deg, #d1d5db, #9ca3af); color: #000; }
  .top3 .rank { background: linear-gradient(135deg, #f59e0b, #d97706); color: #000; }
  .lb-info { display: flex; flex-direction: column; gap: 2px; }
  .lb-mode {
    font-size: 0.75rem;
    color: var(--text-muted);
  }
  .lb-date {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-align: right;
  }
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
    padding: 16px;
  }
  .modal-overlay.show {
    opacity: 1;
    visibility: visible;
  }
  .modal {
    background: linear-gradient(135deg, #1e293b, #1e1b4b);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 32px 28px;
    max-width: 550px;
    width: 100%;
    transform: scale(0.9) translateY(20px);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 25px 80px rgba(0,0,0,0.6);
  }
  .modal-overlay.show .modal {
    transform: scale(1) translateY(0);
  }
  .modal-title {
    font-size: 1.8rem;
    font-weight: 800;
    text-align: center;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--primary-light), #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .modal-subtitle {
    text-align: center;
    color: var(--text-muted);
    margin-bottom: 24px;
    font-size: 0.95rem;
  }
  .victory-emoji {
    text-align: center;
    font-size: 4rem;
    margin-bottom: 16px;
    animation: bounce 1s ease infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }
  .result-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }
  .result-stat {
    background: rgba(15, 23, 42, 0.6);
    padding: 16px;
    border-radius: 14px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .result-stat.winner {
    border-color: var(--success);
    background: rgba(16, 185, 129, 0.1);
    box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
  }
  .result-stat .lbl {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .result-stat .val {
    font-size: 1.5rem;
    font-weight: 800;
  }
  .result-stat.p1 .val { color: var(--p1-color-light); }
  .result-stat.p2 .val { color: var(--p2-color-light); }
  .vs-badge {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    background: linear-gradient(135deg, var(--p1-color), var(--p2-color));
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 1.1rem;
    z-index: 5;
    box-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
    display: none;
  }
  .boards-container.double {
    position: relative;
  }
  .boards-container.double .vs-badge {
    display: flex;
  }
  @media (max-width: 900px) {
    .vs-badge {
      display: none !important;
    }
  }
  .modal-actions {
    display: flex;
    gap: 10px;
    flex-direction: column;
  }
  .pause-hint {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    z-index: 10;
    font-size: 2rem;
    font-weight: 800;
    color: var(--primary-light);
    letter-spacing: 4px;
  }
  .board-container {
    position: relative;
  }
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: rgba(15, 23, 42, 0.95);
    color: white;
    padding: 14px 24px;
    border-radius: 14px;
    font-weight: 600;
    z-index: 200;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--success); }
  .toast.error { border-color: var(--danger); }
  .toast.p1 { border-color: var(--p1-color); }
  .toast.p2 { border-color: var(--p2-color); }
  @media (max-width: 480px) {
    body { padding: 12px; }
    .panel { padding: 16px; }
    .modal { padding: 24px 20px; }
    .settings { grid-template-columns: 1fr; }
    .game-actions button { min-width: 80px; padding: 10px 12px; font-size: 0.85rem; }
    .player-title {
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
    }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🃏 记忆翻牌</h1>
    <p>挑战你的记忆力，找到所有配对的卡牌</p>
  </div>

  <div class="panel">
    <div class="settings">
      <div class="setting-group">
        <label>游戏难度</label>
        <select id="difficulty">
          <option value="4">简单 (4×4)</option>
          <option value="6" selected>中等 (6×6)</option>
          <option value="8">困难 (8×8)</option>
        </select>
      </div>
      <div class="setting-group">
        <label>游戏模式</label>
        <select id="gameMode">
          <option value="single">单人模式</option>
          <option value="double">双人对战</option>
        </select>
      </div>
      <div class="setting-group">
        <button class="btn-primary" id="startBtn">🎮 开始游戏</button>
      </div>
    </div>
  </div>

  <div class="panel" id="statsPanel" style="display:none;">
    <div class="stats" id="statsContainer"></div>
    <div class="game-actions">
      <button class="btn-secondary" id="pauseBtn">⏸️ 暂停</button>
      <button class="btn-secondary" id="restartBtn">🔄 重新开始</button>
      <button class="btn-danger" id="quitBtn">❌ 退出</button>
    </div>
  </div>

  <div class="panel board-container" id="boardPanel" style="display:none;">
    <div class="boards-container" id="boardsContainer">
      <div class="vs-badge">VS</div>
    </div>
    <div class="pause-hint" id="pauseHint" style="display:none;">已暂停</div>
  </div>

  <div class="panel">
    <div class="tab-buttons">
      <button class="tab-btn active" data-tab="single">🏆 单人榜</button>
      <button class="tab-btn" data-tab="double">👥 双人榜</button>
    </div>
    <div id="leaderboardContent"></div>
  </div>
</div>

<div class="modal-overlay" id="victoryModal">
  <div class="modal">
    <div class="victory-emoji" id="victoryEmoji">🎉</div>
    <div class="modal-title" id="victoryTitle">游戏结束！</div>
    <div class="modal-subtitle" id="victorySubtitle"></div>
    <div class="result-stats" id="victoryStats"></div>
    <div class="modal-actions">
      <button class="btn-primary" id="playAgainBtn">🔁 再来一局</button>
      <button class="btn-secondary" id="closeModalBtn">关闭</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  const EMOJIS = [
    '🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🐔',
    '🐧','🐦','🐤','🦆','🦅','🦉','🦇','🐺','🐗','🐴','🦄','🐝','🐛','🦋','🐌','🐞',
    '🐢','🐍','🦎','🦖','🦕','🐙','🦑','🦐','🦞','🐡','🐠','🐟','🐬','🐳','🐊','🐅',
    '🐆','🦓','🦍','🦧','🐘','🦛','🦏','🐪','🐫','🦒','🦘','🐃','🐂','🐄','🐎','🐖'
  ];

  function createPlayerState(playerNum) {
    return {
      player: playerNum,
      cards: [],
      flipped: [],
      matched: [],
      moves: 0,
      elapsed: 0,
      startTime: null,
      timer: null,
      isProcessing: false,
      finished: false,
      finishTime: null
    };
  }

  let state = {
    size: 6,
    mode: 'single',
    players: {},
    isPaused: false,
    gameStarted: false,
    winner: null
  };

  const $ = id => document.getElementById(id);

  const boardsContainer = $('boardsContainer');
  const difficultySelect = $('difficulty');
  const modeSelect = $('gameMode');
  const startBtn = $('startBtn');
  const pauseBtn = $('pauseBtn');
  const restartBtn = $('restartBtn');
  const quitBtn = $('quitBtn');
  const statsPanel = $('statsPanel');
  const boardPanel = $('boardPanel');
  const statsContainer = $('statsContainer');
  const pauseHint = $('pauseHint');
  const victoryModal = $('victoryModal');
  const playAgainBtn = $('playAgainBtn');
  const closeModalBtn = $('closeModalBtn');
  const toast = $('toast');
  const leaderboardContent = $('leaderboardContent');

  startBtn.addEventListener('click', startGame);
  pauseBtn.addEventListener('click', togglePause);
  restartBtn.addEventListener('click', restartGame);
  quitBtn.addEventListener('click', quitGame);
  playAgainBtn.addEventListener('click', () => {
    closeVictoryModal();
    restartGame();
  });
  closeModalBtn.addEventListener('click', closeVictoryModal);
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderLeaderboard(btn.dataset.tab);
    });
  });

  function showToast(msg, type = '') {
    toast.textContent = msg;
    toast.className = 'toast show ' + type;
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function formatTime(ms) {
    if (ms == null) return '--:--';
    const s = Math.floor(ms / 1000);
    const m = Math.floor(s / 60);
    const ss = s % 60;
    return `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
  }

  function generateCards(size) {
    const totalPairs = (size * size) / 2;
    const selectedEmojis = shuffle([...EMOJIS]).slice(0, totalPairs);
    const cardValues = shuffle([...selectedEmojis, ...selectedEmojis]);
    return cardValues.map((val, idx) => ({
      id: idx,
      value: val,
      flipped: false,
      matched: false
    }));
  }

  function startGame() {
    state.size = parseInt(difficultySelect.value);
    state.mode = modeSelect.value;
    state.isPaused = false;
    state.gameStarted = true;
    state.winner = null;

    if (state.mode === 'single') {
      state.players = { 1: createPlayerState(1) };
      state.players[1].cards = generateCards(state.size);
    } else {
      state.players = {
        1: createPlayerState(1),
        2: createPlayerState(2)
      };
      state.players[1].cards = generateCards(state.size);
      state.players[2].cards = generateCards(state.size);
    }

    statsPanel.style.display = 'block';
    boardPanel.style.display = 'block';
    pauseHint.style.display = 'none';

    boardsContainer.className = 'boards-container' + (state.mode === 'double' ? ' double' : '');

    renderStats();
    renderBoards();
    startAllTimers();
    showToast('游戏开始！', 'success');
  }

  function renderBoards() {
    boardsContainer.innerHTML = '';
    if (state.mode === 'double') {
      const vsBadge = document.createElement('div');
      vsBadge.className = 'vs-badge';
      vsBadge.textContent = 'VS';
      boardsContainer.appendChild(vsBadge);
    }

    Object.values(state.players).forEach(p => {
      const playerDiv = document.createElement('div');
      playerDiv.className = `player-board p${p.player}`;
      playerDiv.dataset.player = p.player;
      playerDiv.id = `player-${p.player}`;

      playerDiv.innerHTML = `
        <div class="player-title">
          <h3>👤 玩家${p.player} <span id="p${p.player}-badge"></span></h3>
          <div class="player-mini-stats">
            <span id="p${p.player}-time">${formatTime(0)}</span>
            <span id="p${p.player}-moves">0 步</span>
            <span id="p${p.player}-progress">0/${p.cards.length}</span>
          </div>
        </div>
        <div class="board-wrapper">
          <div class="board size-${state.size}" id="board-${p.player}"></div>
        </div>
      `;

      boardsContainer.appendChild(playerDiv);
      renderPlayerBoard(p);
    });
  }

  function renderPlayerBoard(player) {
    const boardEl = $(`board-${player.player}`);
    boardEl.innerHTML = '';
    player.cards.forEach(card => {
      const el = document.createElement('div');
      el.className = 'card';
      if (card.flipped) el.classList.add('flipped');
      if (card.matched) el.classList.add('matched');
      el.dataset.id = card.id;
      el.innerHTML = `
        <div class="card-inner">
          <div class="card-face card-back"></div>
          <div class="card-face card-front">${card.value}</div>
        </div>
      `;
      el.addEventListener('click', () => handleCardClick(player.player, card.id));
      boardEl.appendChild(el);
    });
  }

  function updatePlayerBoardDisplay(player) {
    const badge = $(`p${player.player}-badge`);
    if (badge) {
      badge.innerHTML = player.finished ? '<span class="finished-badge">已完成 ✓</span>' : '';
    }
    const timeEl = $(`p${player.player}-time`);
    if (timeEl) timeEl.textContent = formatTime(player.elapsed);
    const movesEl = $(`p${player.player}-moves`);
    if (movesEl) movesEl.textContent = `${player.moves} 步`;
    const progEl = $(`p${player.player}-progress`);
    if (progEl) progEl.textContent = `${player.matched.length}/${player.cards.length}`;

    const playerDiv = $(`player-${player.player}`);
    if (playerDiv) {
      if (player.finished) {
        playerDiv.classList.add('finished');
      } else {
        playerDiv.classList.remove('finished');
      }
    }
  }

  function renderStats() {
    let html = '';
    if (state.mode === 'single') {
      html = `
        <div class="stat-card">
          <div class="label">⏱️ 用时</div>
          <div class="value" id="timeDisplay">${formatTime(0)}</div>
        </div>
        <div class="stat-card">
          <div class="label">👆 步数</div>
          <div class="value" id="movesDisplay">0</div>
        </div>
        <div class="stat-card">
          <div class="label">✅ 进度</div>
          <div class="value" id="progressDisplay">0/${state.players[1].cards.length}</div>
        </div>
      `;
    } else {
      const totalPairs = state.players[1].cards.length / 2;
      html = `
        <div class="scoreboard" id="scoreboard">
          <div class="score-col p1" id="scoreCol1">
            <div class="score-header">
              <h4>🔵 玩家1</h4>
              <span class="leading-badge">🏆 领先</span>
            </div>
            <div class="progress-bar-container">
              <div class="progress-bar" id="p1ProgressBar" style="width:0%"></div>
              <div class="progress-text" id="p1ProgressText">0/${state.players[1].cards.length}</div>
            </div>
            <div class="score-details">
              <div class="score-detail">
                <div class="sd-label">⏱️ 用时</div>
                <div class="sd-value" id="p1TimeScore">${formatTime(0)}</div>
              </div>
              <div class="score-detail">
                <div class="sd-label">👆 步数</div>
                <div class="sd-value" id="p1MovesScore">0</div>
              </div>
            </div>
          </div>
          <div class="score-vs">
            <div class="score-vs-badge">VS</div>
            <div class="score-vs-status" id="vsStatusText">对战中</div>
          </div>
          <div class="score-col p2" id="scoreCol2">
            <div class="score-header">
              <h4>🩷 玩家2</h4>
              <span class="leading-badge">🏆 领先</span>
            </div>
            <div class="progress-bar-container">
              <div class="progress-bar" id="p2ProgressBar" style="width:0%"></div>
              <div class="progress-text" id="p2ProgressText">0/${state.players[2].cards.length}</div>
            </div>
            <div class="score-details">
              <div class="score-detail">
                <div class="sd-label">⏱️ 用时</div>
                <div class="sd-value" id="p2TimeScore">${formatTime(0)}</div>
              </div>
              <div class="score-detail">
                <div class="sd-label">👆 步数</div>
                <div class="sd-value" id="p2MovesScore">0</div>
              </div>
            </div>
          </div>
        </div>
      `;
    }
    statsContainer.innerHTML = html;
  }

  function updateStatDisplays() {
    if (state.mode === 'single') {
      const p = state.players[1];
      const timeEl = $('timeDisplay');
      if (timeEl) timeEl.textContent = formatTime(p.elapsed);
      const movesEl = $('movesDisplay');
      if (movesEl) movesEl.textContent = p.moves;
      const progEl = $('progressDisplay');
      if (progEl) progEl.textContent = `${p.matched.length}/${p.cards.length}`;
    } else {
      const p1 = state.players[1];
      const p2 = state.players[2];

      const p1Time = $('p1TimeScore');
      const p2Time = $('p2TimeScore');
      if (p1Time) p1Time.textContent = formatTime(p1.elapsed);
      if (p2Time) p2Time.textContent = formatTime(p2.elapsed);

      const p1Moves = $('p1MovesScore');
      const p2Moves = $('p2MovesScore');
      if (p1Moves) p1Moves.textContent = p1.moves;
      if (p2Moves) p2Moves.textContent = p2.moves;

      const p1Prog = $('p1ProgressBar');
      const p2Prog = $('p2ProgressBar');
      const p1ProgText = $('p1ProgressText');
      const p2ProgText = $('p2ProgressText');
      const p1Percent = p1.cards.length ? (p1.matched.length / p1.cards.length) * 100 : 0;
      const p2Percent = p2.cards.length ? (p2.matched.length / p2.cards.length) * 100 : 0;
      if (p1Prog) p1Prog.style.width = p1Percent + '%';
      if (p2Prog) p2Prog.style.width = p2Percent + '%';
      if (p1ProgText) p1ProgText.textContent = `${p1.matched.length}/${p1.cards.length}`;
      if (p2ProgText) p2ProgText.textContent = `${p2.matched.length}/${p2.cards.length}`;

      const col1 = $('scoreCol1');
      const col2 = $('scoreCol2');
      if (col1 && col2) {
        col1.classList.remove('leading', 'tied');
        col2.classList.remove('leading', 'tied');

        if (state.winner === 1) {
          col1.classList.add('leading');
        } else if (state.winner === 2) {
          col2.classList.add('leading');
        } else if (p1.matched.length > p2.matched.length) {
          col1.classList.add('leading');
        } else if (p2.matched.length > p1.matched.length) {
          col2.classList.add('leading');
        } else if (p1.matched.length === p2.matched.length && p1.matched.length > 0) {
          col1.classList.add('tied');
          col2.classList.add('tied');
        }
      }

      const vsStatus = $('vsStatusText');
      if (vsStatus) {
        if (state.winner) {
          vsStatus.textContent = `P${state.winner}领先`;
          vsStatus.style.color = state.winner === 1 ? 'var(--p1-color-light)' : 'var(--p2-color-light)';
        } else if (p1.finished && p2.finished) {
          vsStatus.textContent = '已结束';
          vsStatus.style.color = 'var(--text-muted)';
        } else if (p1.finished) {
          vsStatus.textContent = 'P1完赛';
          vsStatus.style.color = 'var(--p1-color-light)';
        } else if (p2.finished) {
          vsStatus.textContent = 'P2完赛';
          vsStatus.style.color = 'var(--p2-color-light)';
        } else if (p1.matched.length === p2.matched.length) {
          vsStatus.textContent = '势均力敌';
          vsStatus.style.color = 'var(--warning)';
        } else {
          vsStatus.textContent = '激烈角逐';
          vsStatus.style.color = 'var(--text-muted)';
        }
      }
    }

    Object.values(state.players).forEach(p => updatePlayerBoardDisplay(p));
  }

  function startAllTimers() {
    stopAllTimers();
    Object.values(state.players).forEach(p => {
      p.startTime = Date.now() - p.elapsed;
      p.timer = setInterval(() => {
        if (!state.isPaused && !p.finished) {
          p.elapsed = Date.now() - p.startTime;
          updateStatDisplays();
        }
      }, 250);
    });
  }

  function stopAllTimers() {
    Object.values(state.players).forEach(p => {
      if (p.timer) {
        clearInterval(p.timer);
        p.timer = null;
      }
    });
  }

  function togglePause() {
    if (!state.gameStarted) return;
    state.isPaused = !state.isPaused;
    pauseHint.style.display = state.isPaused ? 'flex' : 'none';
    pauseBtn.textContent = state.isPaused ? '▶️ 继续' : '⏸️ 暂停';
    if (state.isPaused) {
      showToast('游戏已暂停', '');
    } else {
      Object.values(state.players).forEach(p => {
        if (!p.finished) {
          p.startTime = Date.now() - p.elapsed;
        }
      });
      showToast('游戏继续', 'success');
    }
  }

  function handleCardClick(playerNum, cardId) {
    if (!state.gameStarted || state.isPaused) return;
    const player = state.players[playerNum];
    if (player.finished || player.isProcessing) return;

    const card = player.cards[cardId];
    if (card.flipped || card.matched) return;

    card.flipped = true;
    player.flipped.push(card);
    const boardEl = $(`board-${playerNum}`);
    const el = boardEl.querySelector(`[data-id="${cardId}"]`);
    el.classList.add('flipped');

    if (player.flipped.length === 2) {
      player.moves++;
      player.isProcessing = true;
      updateStatDisplays();
      checkMatch(playerNum);
    }
  }

  function checkMatch(playerNum) {
    const player = state.players[playerNum];
    const [c1, c2] = player.flipped;
    const boardEl = $(`board-${playerNum}`);

    if (c1.value === c2.value) {
      c1.matched = true;
      c2.matched = true;
      player.matched.push(c1, c2);
      const el1 = boardEl.querySelector(`[data-id="${c1.id}"]`);
      const el2 = boardEl.querySelector(`[data-id="${c2.id}"]`);
      el1.classList.add('matched');
      el2.classList.add('matched');

      player.flipped = [];
      player.isProcessing = false;
      updateStatDisplays();
      showToast(`玩家${playerNum} 配对成功！✨`, 'p' + playerNum);
      setTimeout(() => checkWin(playerNum), 300);
    } else {
      setTimeout(() => {
        c1.flipped = false;
        c2.flipped = false;
        const el1 = boardEl.querySelector(`[data-id="${c1.id}"]`);
        const el2 = boardEl.querySelector(`[data-id="${c2.id}"]`);
        el1.classList.remove('flipped');
        el2.classList.remove('flipped');
        player.flipped = [];
        player.isProcessing = false;
      }, 1000);
    }
  }

  function checkWin(playerNum) {
    const player = state.players[playerNum];
    if (player.matched.length === player.cards.length && !player.finished) {
      player.finished = true;
      player.finishTime = player.elapsed;
      if (player.timer) {
        clearInterval(player.timer);
        player.timer = null;
      }
      updateStatDisplays();
      showToast(`🎉 玩家${playerNum} 完成！`, 'success');

      if (state.mode === 'single') {
        state.gameStarted = false;
        saveRecord();
        setTimeout(showVictory, 500);
      } else {
        const otherNum = playerNum === 1 ? 2 : 1;
        const other = state.players[otherNum];

        if (!state.winner) {
          state.winner = playerNum;
        }

        if (other.finished) {
          state.gameStarted = false;
          saveRecord();
          setTimeout(showVictory, 800);
        }
      }
    }
  }

  function saveRecord() {
    const key = state.mode === 'single' ? 'memory_single_records' : 'memory_double_records';
    const records = JSON.parse(localStorage.getItem(key) || '[]');

    let record;
    if (state.mode === 'single') {
      const p = state.players[1];
      record = {
        size: state.size,
        time: p.elapsed,
        moves: p.moves,
        date: new Date().toISOString(),
        winner: null,
        players: null
      };
    } else {
      const p1 = state.players[1];
      const p2 = state.players[2];
      record = {
        size: state.size,
        time: Math.max(p1.elapsed, p2.elapsed),
        moves: p1.moves + p2.moves,
        date: new Date().toISOString(),
        winner: state.winner,
        players: {
          1: { time: p1.elapsed, moves: p1.moves, finished: p1.finished },
          2: { time: p2.elapsed, moves: p2.moves, finished: p2.finished }
        }
      };
    }

    records.push(record);
    records.sort((a, b) => {
      if (a.size !== b.size) return a.size - b.size;
      if (state.mode === 'single') {
        if (a.time !== b.time) return a.time - b.time;
        return a.moves - b.moves;
      } else {
        return 0;
      }
    });
    localStorage.setItem(key, JSON.stringify(records.slice(0, 50)));
    renderLeaderboard(state.mode);
  }

  function showVictory() {
    const modal = victoryModal;
    const title = $('victoryTitle');
    const subtitle = $('victorySubtitle');
    const emoji = $('victoryEmoji');
    const stats = $('victoryStats');

    if (state.mode === 'single') {
      const p = state.players[1];
      emoji.textContent = '🎉';
      title.textContent = '恭喜通关！';
      subtitle.textContent = `难度：${state.size}×${state.size}`;
      stats.innerHTML = `
        <div class="result-stat">
          <div class="lbl">⏱️ 用时</div>
          <div class="val">${formatTime(p.elapsed)}</div>
        </div>
        <div class="result-stat">
          <div class="lbl">👆 步数</div>
          <div class="val">${p.moves}</div>
        </div>
      `;
    } else {
      const p1 = state.players[1];
      const p2 = state.players[2];

      if (state.winner === 1) {
        emoji.textContent = '🏆';
        title.textContent = '玩家1 获胜！';
      } else if (state.winner === 2) {
        emoji.textContent = '🎖️';
        title.textContent = '玩家2 获胜！';
      } else {
        emoji.textContent = '🤝';
        title.textContent = '平局！';
      }

      subtitle.textContent = `难度：${state.size}×${state.size} · 玩家${state.winner}率先完成`;

      const p1Winner = state.winner === 1 ? 'winner' : '';
      const p2Winner = state.winner === 2 ? 'winner' : '';

      stats.innerHTML = `
        <div class="result-stat p1 ${p1Winner}">
          <div class="lbl">👤 玩家1</div>
          <div class="val" style="color:var(--p1-color-light);">${formatTime(p1.elapsed)}</div>
          <div style="font-size:0.8rem;color:var(--text-muted);margin-top:4px;">${p1.moves} 步</div>
        </div>
        <div class="result-stat p2 ${p2Winner}">
          <div class="lbl">👤 玩家2</div>
          <div class="val" style="color:var(--p2-color-light);">${formatTime(p2.elapsed)}</div>
          <div style="font-size:0.8rem;color:var(--text-muted);margin-top:4px;">${p2.moves} 步</div>
        </div>
      `;
    }

    modal.classList.add('show');
  }

  function closeVictoryModal() {
    victoryModal.classList.remove('show');
  }

  function restartGame() {
    stopAllTimers();
    startGame();
  }

  function quitGame() {
    stopAllTimers();
    state.gameStarted = false;
    statsPanel.style.display = 'none';
    boardPanel.style.display = 'none';
    showToast('已退出游戏', '');
  }

  function renderLeaderboard(tab) {
    const key = tab === 'single' ? 'memory_single_records' : 'memory_double_records';
    const records = JSON.parse(localStorage.getItem(key) || '[]');

    if (records.length === 0) {
      leaderboardContent.innerHTML = `
        <div class="empty-state">
          <div class="icon">📭</div>
          <div>暂无记录，开始游戏创建你的第一个记录吧！</div>
        </div>
      `;
      return;
    }

    const sizeMap = { 4: '简单 4×4', 6: '中等 6×6', 8: '困难 8×8' };
    const html = ['<div class="leaderboard">'];

    records.forEach((r, i) => {
      const cls = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
      const date = new Date(r.date);
      const dateStr = `${date.getMonth()+1}/${date.getDate()} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;

      if (tab === 'single') {
        html.push(`
          <div class="leaderboard-item ${cls}">
            <div class="rank">${i + 1}</div>
            <div class="lb-info">
              <div>${sizeMap[r.size] || r.size + '×' + r.size}</div>
              <div class="lb-mode">${r.moves} 步</div>
            </div>
            <div style="font-weight:700;font-size:1rem;">${formatTime(r.time)}</div>
            <div class="lb-date">${dateStr}</div>
          </div>
        `);
      } else {
        const p1Time = formatTime(r.players?.[1]?.time);
        const p2Time = formatTime(r.players?.[2]?.time);
        const winnerText = r.winner ? `🏆 玩家${r.winner}胜` : '平局';
        html.push(`
          <div class="leaderboard-item ${cls}">
            <div class="rank">${i + 1}</div>
            <div class="lb-info">
              <div>${sizeMap[r.size] || r.size + '×' + r.size}</div>
              <div class="lb-mode">${winnerText} · P1:${p1Time} / P2:${p2Time}</div>
            </div>
            <div style="font-weight:700;font-size:1rem;">${formatTime(r.time)}</div>
            <div class="lb-date">${dateStr}</div>
          </div>
        `);
      }
    });

    html.push('</div>');
    leaderboardContent.innerHTML = html.join('');
  }

  renderLeaderboard('single');
})();
</script>
</body>
</html>
